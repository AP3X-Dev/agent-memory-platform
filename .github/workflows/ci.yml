name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # Fast job: type-check + unit tests (no infrastructure needed)
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run unit tests
        run: npm test
        env:
          REDIS_URL: ""
          NEO4J_URI: ""

      # Memory-quality gate: deterministic Recall@k / MRR / nDCG@k over a committed golden
      # set, using the lexical + RRF + MMR ranking path only (no embeddings, no live
      # Neo4j/Redis). Exits non-zero on any threshold regression. See bench/quality/.
      - name: Memory-quality gate (Recall/MRR/nDCG)
        run: npm run bench:quality
        env:
          REDIS_URL: ""
          NEO4J_URI: ""

  # Full job: integration tests with Redis + Neo4j service containers
  integration:
    runs-on: ubuntu-latest
    needs: unit

    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      neo4j:
        image: neo4j:5-community
        ports:
          - 7687:7687
          - 7474:7474
        env:
          NEO4J_AUTH: neo4j/testpassword
          NEO4J_PLUGINS: '["apoc"]'
        options: >-
          --health-cmd "cypher-shell -u neo4j -p testpassword 'RETURN 1'"
          --health-interval 10s
          --health-timeout 10s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build all packages
        run: npm run build

      - name: Run all tests (unit + integration)
        run: npm test
        env:
          REDIS_URL: redis://localhost:6379
          NEO4J_URI: bolt://localhost:7687
          NEO4J_USER: neo4j
          NEO4J_PASSWORD: testpassword
