# AMP infrastructure — Neo4j only.
# Redis is shared from ~/infra (cerebro-redis), bound to 127.0.0.1 with requirepass.
# MCP server runs via systemd (memberry-mcp.service), not Docker.

services:
  neo4j:
    image: neo4j:5-community
    container_name: memberry-neo4j
    ports:
      - "127.0.0.1:7474:7474"
      - "127.0.0.1:7687:7687"
    volumes:
      - neo4j_data:/data
      - neo4j_plugins:/plugins
    environment:
      NEO4J_AUTH: neo4j/amp-memory-2026
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_dbms_memory_heap_initial__size: "256m"
      NEO4J_dbms_memory_heap_max__size: "512m"
      NEO4J_dbms_memory_pagecache_size: "256m"
    restart: unless-stopped

volumes:
  neo4j_data:
    name: amp_neo4j_data
    external: true
  neo4j_plugins:
    name: amp_neo4j_plugins
    external: true
